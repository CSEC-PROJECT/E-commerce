openapi: 3.0.0
info:
  title: E-Commerce API
  version: 1.0.0
  description: Authentication and Admin Product APIs

servers:
  - url: http://localhost:3000
  - url: https://e-commerce-he4h.onrender.com


tags:
  - name: Auth
    description: Authentication endpoints
  - name: Admin Products
    description: Admin product management
  - name: Admin Users
    description: Admin user management
  - name: Products
    description: Public product endpoints
  - name: Admin Orders
    description: Admin order management
  - name: Orders
    description: User order management
  - name: Cart
    description: User shopping cart management

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: array
          items:
            type: string
        isVerified:
          type: boolean
        profilePic:
          type: string
        cloudinaryId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Order:
      type: object
      properties:
        _id:
          type: string
        userId:
          type: string
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: number
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, paid, shipped, delivered]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CartItem:
      type: object
      required:
        - product
        - quantity
        - price
      properties:
        product:
          oneOf:
            - type: string
              description: The Product ID
            - $ref: '#/components/schemas/Product'
        quantity:
          type: number
          minimum: 1
          default: 1
        price:
          type: number
          minimum: 0

    Cart:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        totalPrice:
          type: number
          default: 0
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Product:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: number
        status:
          type: string
        madeIn:
          type: string
        material:
          type: string
        coverImage:
          type: string
        detailImages:
          type: array
          items:
            type: string

paths:

  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register User
      description: Register a new user with profile picture and send email verification.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                profilePic:
                  type: string
                  format: binary
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      role:
                        type: array
                        items:
                          type: string
                      isVerified:
                        type: boolean
                      profilePic:
                        type: string
                      cloudinaryId:
                        type: string
                      createdAt:
                        type: string
                        format: date-time
                      updatedAt:
                        type: string
                        format: date-time
                  accessToken:
                    type: string
        "400":
          description: Bad request

  /api/auth/verify:
    get:
      tags: [Auth]
      summary: Verify Email
      description: Verify user email via token sent to email.
      parameters:
        - in: query
          name: token
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to frontend login page
        "400":
          description: Invalid or missing token

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login User
      description: Authenticate user and return tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      _id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      role:
                        type: array
                        items:
                          type: string
                      isVerified:
                        type: boolean
                      profilePic:
                        type: string
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        "400":
          description: Invalid credentials
        "401":
          description: Email not verified

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh Token
      description: Generate new access and refresh tokens.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string
        "400":
          description: Refresh token required
        "401":
          description: Invalid refresh token

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout User
      description: Logout user and invalidate refresh token.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        "200":
          description: Logged out successfully

  /api/auth/password-reset/request:
    post:
      tags: [Auth]
      summary: Request Password Reset
      description: Send password reset link to email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
      responses:
        "200":
          description: Reset link sent if email exists

  /api/auth/password-reset/confirm:
    post:
      tags: [Auth]
      summary: Confirm Password Reset
      description: Reset password using token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
                - newPassword
              properties:
                token:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          description: Password reset successful
        "400":
          description: Invalid or expired token


  /api/admin/products:
    post:
      tags: [Admin Products]
      summary: Create Product (Admin)
      description: Create a new product with images (Admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - name
                - description
                - category
                - price
                - stock
                - coverImage
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                price:
                  type: number
                stock:
                  type: number
                status:
                  type: string
                  enum: [used, slightly used, new]
                madeIn:
                  type: string
                material:
                  type: string
                coverImage:
                  type: string
                  format: binary
                detailImages:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  product:
                    type: object
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)

  /api/admin/products/{id}:
    put:
      tags: [Admin Products]
      summary: Update Product (Admin)
      description: Update product details and images.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      requestBody:
        required: false
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                category:
                  type: string
                price:
                  type: number
                stock:
                  type: number
                status:
                  type: string
                  enum: [used, slightly used, new]
                madeIn:
                  type: string
                material:
                  type: string
                coverImage:
                  type: string
                  format: binary
                detailImages:
                  type: array
                  items:
                    type: string
                    format: binary
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  product:
                    type: object
        "400":
          description: Invalid product ID or validation error
        "404":
          description: Product not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)

    delete:
      tags: [Admin Products]
      summary: Delete Product (Admin)
      description: Delete a product by ID.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Product deleted successfully
        "400":
          description: Invalid product ID
        "404":
          description: Product not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)

  /api/products:
    get:
      tags: [Products]
      summary: Get Products
      description: Fetch all products with optional filtering, search, and pagination.
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search by product name
        - in: query
          name: category
          schema:
            type: string
          description: Filter by category
        - in: query
          name: status
          schema:
            type: string
            enum: [used, slightly used, new]
          description: Filter by product status
        - in: query
          name: minPrice
          schema:
            type: number
          description: Minimum price
        - in: query
          name: maxPrice
          schema:
            type: number
          description: Maximum price
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of products per page
      responses:
        "200":
          description: Products fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  products:
                    type: array
                    items:
                      $ref: '#/components/schemas/Product'
        "500":
          description: Server error

  /api/products/{id}:
    get:
      tags: [Products]
      summary: Get Product by ID
      description: Fetch a single product by its ID.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Product ID
      responses:
        "200":
          description: Product fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  product:
                    $ref: '#/components/schemas/Product'
        "400":
          description: Invalid product ID
        "404":
          description: Product not found
        "500":
          description: Server error


  /api/admin/orders:
    get:
      tags: [Admin Orders]
      summary: Get All Orders (Admin)
      description: Fetch all orders with user details (Admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)
        "500":
          description: Server error

  /api/admin/orders/{id}:
    put:
      tags: [Admin Orders]
      summary: Update Order Status (Admin)
      description: Update the status of an order.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Order ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, paid, shipped, delivered]
      responses:
        "200":
          description: Order status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'
        "400":
          description: Invalid order ID or status
        "404":
          description: Order not found
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)
        "500":
          description: Server error


  /api/user/orders:
    post:
      tags: [Orders]
      summary: Create Order
      description: Create a new order for the authenticated user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - totalPrice
              properties:
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      productId:
                        type: string
                      quantity:
                        type: number
                totalPrice:
                  type: number
                status:
                  type: string
                  enum: [pending, paid, shipped, delivered]
      responses:
        "201":
          description: Order created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  order:
                    $ref: '#/components/schemas/Order'
        "400":
          description: Missing required fields
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /api/user/orders/my:
    get:
      tags: [Orders]
      summary: Get My Orders
      description: Fetch all orders of the authenticated user.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /api/user/orders/{id}:
    get:
      tags: [Orders]
      summary: Get Order by ID
      description: Fetch a single order (only owner or admin can access).
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: Order ID
      responses:
        "200":
          description: Order fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  order:
                    $ref: '#/components/schemas/Order'
        "400":
          description: Invalid order ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Order not found
        "500":
          description: Server error


  /api/user/cart:
    get:
      tags: [Cart]
      summary: Get User Cart
      description: Fetch the current user's cart. Returns an empty cart if none exists.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cart:
                    $ref: '#/components/schemas/Cart'
        "401":
          description: Unauthorized

    post:
      tags: [Cart]
      summary: Create or Update Cart
      description: Creates a new cart or overwrites the existing one for the user.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/CartItem'
                totalPrice:
                  type: number
      responses:
        "201":
          description: Cart created successfully
        "200":
          description: Cart updated successfully
        "400":
          description: Invalid items array

  /api/user/cart/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: The Cart ID
    put:
      tags: [Cart]
      summary: Update Cart by ID
      description: Update specific fields of a cart. (Owner or Admin only)
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    $ref: '#/components/schemas/CartItem'
                totalPrice:
                  type: number
      responses:
        "200":
          description: Cart updated successfully
        "403":
          description: Forbidden - Not the owner or admin
        "404":
          description: Cart not found

  /api/admin/users:
    get:
      tags: [Admin Users]
      summary: Get All Users (Admin)
      description: Fetch paginated list of users (Admin only).
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: search
          schema:
            type: string
          description: Search users by name or email
      responses:
        "200":
          description: Users fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      page:
                        type: integer
                      limit:
                        type: integer
                      totalPages:
                        type: integer
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)

  /api/admin/users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: User ID
    get:
      tags: [Admin Users]
      summary: Get User by ID (Admin)
      description: Fetch a single user by ID (Admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User fetched successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        "400":
          description: Invalid user ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)
        "404":
          description: User not found

    put:
      tags: [Admin Users]
      summary: Update User (Admin)
      description: Update user fields (Admin only).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                role:
                  type: array
                  items:
                    type: string
                isVerified:
                  type: boolean
      responses:
        "200":
          description: User updated successfully
        "400":
          description: Invalid user ID or validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)
        "404":
          description: User not found

    delete:
      tags: [Admin Users]
      summary: Delete User (Admin)
      description: Delete a user by ID (Admin only).
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User deleted successfully
        "400":
          description: Invalid user ID
        "401":
          description: Unauthorized
        "403":
          description: Forbidden (Admin only)
        "404":
          description: User not found

    delete:
      tags: [Cart]
      summary: Delete Cart
      description: Delete a specific cart by ID. (Owner or Admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cart deleted successfully
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Cart not found